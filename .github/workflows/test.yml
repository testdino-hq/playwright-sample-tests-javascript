# .github/workflows/playwright-daily.yml

name: Run Playwright tests

on:
  push:
  pull_request:
  schedule:
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tests:
    name: Run shard ${{ matrix.shardIndex }}/5
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: "--experimental-vm-modules"

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1,2,3,4,5]
        shardTotal: [5]

    steps:
      - uses: actions/checkout@v4

      # ✅ Node 20 (fixes ESM issues)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # ✅ Create env file
      - name: Create .env file
        run: |
          echo "USERNAME=${{ secrets.USERNAME }}" >> .env
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
          echo "NEW_PASSWORD=${{ secrets.NEW_PASSWORD }}" >> .env
          echo "FIRST_NAME=${{ secrets.FIRST_NAME }}" >> .env
          echo "STREET_NAME=${{ secrets.STREET_NAME }}" >> .env
          echo "CITY=${{ secrets.CITY }}" >> .env
          echo "STATE=${{ secrets.STATE }}" >> .env
          echo "COUNTRY=${{ secrets.COUNTRY }}" >> .env
          echo "ZIP_CODE=${{ secrets.ZIP_CODE }}" >> .env

      # ✅ Cache dependencies
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ✅ Install deps properly
      - name: Install dependencies + browsers
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps

      - name: Debug Playwright projects
        run: npx playwright list --projects

      # ✅ Run tests (with rerun support)
      - name: Run Playwright tests
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
        run: |
          echo "GitHub run attempt: ${{ github.run_attempt }}"

          if [[ "${{ github.run_attempt }}" -gt 1 ]]; then
            echo "Re-run detected → fetching failed tests"
            npx tdpw last-failed \
              --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
              > failed.txt

            EXTRA_FLAGS="$(cat failed.txt)"

            if [[ -n "$EXTRA_FLAGS" ]]; then
              echo "Running failed tests only:"
              echo "$EXTRA_FLAGS"
              npx playwright test $EXTRA_FLAGS
              exit 0
            fi

            echo "No failed tests found → running full suite"
          fi

          npx playwright test \
            --reporter=blob \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      # ✅ Upload shard report
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

      # ✅ FIXED TestDino cache (THIS WAS YOUR ERROR)
      - name: Cache TestDino metadata
        if: always()
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
        run: |
          npx --yes @testdino/playwright cache --verbose

  # =========================

  merge-reports:
    name: Merge Reports
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: "--experimental-vm-modules"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: ./all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: |
          npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: Playwright Report
          path: playwright-report
          retention-days: 14

      # ✅ Send to TestDino
      - name: Upload to TestDino
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
        run: |
          npx --yes tdpw ./playwright-report \
            --token="${{ secrets.TESTDINO_TOKEN }}" \
            --upload-html \
            --verbose